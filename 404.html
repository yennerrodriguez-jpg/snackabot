<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting… — Snackabot</title>
    <meta http-equiv="refresh" content="0; url=./">
    <meta name="theme-color" content="#FFE135">
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #FFE135;
            color: #0A0A0A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Comfortaa', 'Trebuchet MS', system-ui, sans-serif;
            text-align: center;
        }
        .msg { padding: 2rem; max-width: 500px; }
        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin: 0 0 0.75rem;
            letter-spacing: -0.02em;
            font-weight: 700;
        }
        p { margin: 0; opacity: 0.8; font-size: 1.05rem; }
        a { color: #0A0A0A; font-weight: 700; }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FF3D5A;
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="msg">
        <h1><span class="dot"></span>Snackabot</h1>
        <p>Taking you home… <a href="./">Click here if you're stuck.</a></p>
    </div>
    <script>window.location.replace('./');</script>
</body>
</html>
